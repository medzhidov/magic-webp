<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic WebP - Animated WebP Processing</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-top: 0;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }
    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover {
      border-color: #4CAF50;
      background: #f9f9f9;
    }
    .upload-area.dragover {
      border-color: #4CAF50;
      background: #e8f5e9;
    }
    input[type="file"] {
      display: none;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    .control-group {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 6px;
    }
    .control-group h3 {
      margin-top: 0;
      color: #666;
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .input-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }
    details {
      margin-top: 20px;
    }
    summary {
      user-select: none;
    }
    h4 {
      margin: 0;
      padding: 0;
    }
    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    input[type="number"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
      width: 100%;
      margin-top: 10px;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .preview {
      margin: 20px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .preview-box {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 15px;
    }
    .preview-box h3 {
      margin-top: 0;
      color: #666;
      font-size: 14px;
      text-transform: uppercase;
    }
    .preview-box img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      display: block;
    }
    .info {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
    .status {
      padding: 12px;
      border-radius: 4px;
      margin: 10px 0;
      font-size: 14px;
    }
    .status.error {
      background: #ffebee;
      color: #c62828;
    }
    .status.ok {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .download-link {
      display: inline-block;
      margin-top: 10px;
      color: #4CAF50;
      text-decoration: none;
      font-size: 14px;
    }
    .download-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 Magic WebP</h1>
    <p class="subtitle">Process animated WebP files directly in your browser using WebAssembly</p>

    <div class="upload-area" id="uploadArea">
      <p>📁 Drop an animated WebP file here or click to select</p>
      <input type="file" id="fileInput" accept="image/webp,.webp">
    </div>

    <div id="statusContainer"></div>

    <!-- Quick Actions -->
    <div class="control-group">
      <h3>⚡ Quick Actions</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
        <button id="btnCropCenter" disabled>Crop Center 200×200</button>
        <button id="btnResize400" disabled>Cover 400×400</button>
        <button id="btnResizeFit300" disabled>Contain 300×300</button>
      </div>
    </div>

    <!-- Advanced Controls -->
    <details class="control-group">
      <summary style="cursor: pointer; font-weight: 600; padding: 10px 0;">🔧 Advanced Controls</summary>

      <div style="margin-top: 15px;">
        <h4 style="margin: 15px 0 10px 0; color: #666; font-size: 13px;">✂️ Crop</h4>
        <div class="input-row">
          <div>
            <label>X</label>
            <input type="number" id="cropX" value="0" min="0">
          </div>
          <div>
            <label>Y</label>
            <input type="number" id="cropY" value="0" min="0">
          </div>
          <div>
            <label>Width</label>
            <input type="number" id="cropW" value="200" min="1">
          </div>
          <div>
            <label>Height</label>
            <input type="number" id="cropH" value="200" min="1">
          </div>
        </div>
        <button id="btnCrop" disabled>Apply Crop</button>

        <h4 style="margin: 15px 0 10px 0; color: #666; font-size: 13px;">📐 Resize Modes</h4>
        <div class="input-row">
          <div>
            <label>Width</label>
            <input type="number" id="resizeW" value="400" min="1">
          </div>
          <div>
            <label>Height</label>
            <input type="number" id="resizeH" value="400" min="1">
          </div>
        </div>
        <button id="btnResize" disabled>Cover (fill & crop)</button>
        <button id="btnResizeFit" disabled style="margin-top: 5px;">Contain (fit inside)</button>
      </div>
    </details>

    <div class="preview">
      <div class="preview-box">
        <h3>Original</h3>
        <img id="origImg" style="display:none" alt="Original">
        <div class="info" id="origInfo"></div>
      </div>
      <div class="preview-box">
        <h3>Processed</h3>
        <img id="resultImg" style="display:none" alt="Processed">
        <div class="info" id="resultInfo"></div>
        <a class="download-link" id="dlLink" style="display:none" download="result.webp">⬇ Download</a>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
