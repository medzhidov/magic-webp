<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>magic-webp demo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #0f0f13; color: #e0e0e0; padding: 2rem; }
      h1 { font-size: 1.6rem; margin-bottom: 0.25rem; color: #7dd3fc; }
      .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
      .card { background: #1a1a24; border: 1px solid #2e2e42; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }
      h2 { font-size: 1rem; color: #a5b4fc; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: .06em; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: .75rem; }
      label { display: flex; flex-direction: column; gap: 4px; font-size: .82rem; color: #94a3b8; }
      input[type=number], input[type=range] { width: 100%; padding: 6px 8px; background: #0f0f13; border: 1px solid #3a3a55; border-radius: 6px; color: #e0e0e0; font-size: .9rem; }
      input[type=file] { color: #94a3b8; font-size: .85rem; }
      .btn { display: inline-block; padding: .55rem 1.4rem; border-radius: 7px; font-size: .9rem; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s; }
      .btn:hover { opacity: .85; }
      .btn-primary { background: #6366f1; color: #fff; }
      .btn-secondary { background: #22d3ee; color: #0f172a; }
      .actions { display: flex; gap: .75rem; flex-wrap: wrap; margin-top: 1rem; }
      .previews { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
      .preview-box { display: flex; flex-direction: column; gap: .5rem; }
      .preview-box span { font-size: .8rem; color: #64748b; }
      .preview-box img { max-width: 100%; max-height: 320px; border-radius: 6px; border: 1px solid #2e2e42; object-fit: contain; background: #0f0f13; }
      #status { font-size: .85rem; color: #94a3b8; margin-top: .75rem; min-height: 1.2em; }
      #status.error { color: #f87171; }
      #status.ok { color: #4ade80; }
      a.dl { font-size: .82rem; color: #7dd3fc; text-decoration: none; }
      a.dl:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <h1>✨ magic-webp</h1>
    <p class="subtitle">Browser image processing via WebAssembly — crop &amp; resize → WebP</p>

    <div class="card">
      <h2>📂 Input image</h2>
      <input type="file" id="fileInput" accept="image/*" />
    </div>

    <div class="card">
      <h2>✂️ Crop</h2>
      <div class="grid">
        <label>X <input type="number" id="cropX" value="0" min="0" /></label>
        <label>Y <input type="number" id="cropY" value="0" min="0" /></label>
        <label>Width <input type="number" id="cropW" value="400" min="1" /></label>
        <label>Height <input type="number" id="cropH" value="300" min="1" /></label>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="btnCrop">Apply crop</button>
      </div>
    </div>

    <div class="card">
      <h2>↔️ Resize</h2>
      <div class="grid">
        <label>Width <input type="number" id="resizeW" value="800" min="1" /></label>
        <label>Height <input type="number" id="resizeH" value="600" min="1" /></label>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="btnResize">Resize exact</button>
        <button class="btn btn-primary" id="btnResizeFit">Resize fit (aspect ratio)</button>
      </div>
    </div>

    <div class="card">
      <h2>🖼️ Preview</h2>
      <label style="margin-bottom:.75rem">
        WebP quality: <span id="qualityVal">0.92</span>
        <input type="range" id="quality" min="0.1" max="1" step="0.01" value="0.92" />
      </label>
      <div class="previews">
        <div class="preview-box">
          <strong>Original</strong>
          <span id="origInfo">—</span>
          <img id="origImg" alt="Original" />
        </div>
        <div class="preview-box">
          <strong>Result (WebP)</strong>
          <span id="resultInfo">—</span>
          <img id="resultImg" alt="Result" />
          <a class="dl" id="dlLink" style="display:none" download="result.webp">⬇ Download result.webp</a>
        </div>
      </div>
      <p id="status"></p>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
