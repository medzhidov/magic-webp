<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic WebP - Emscripten Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-top: 0;
    }
    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover {
      border-color: #4CAF50;
      background: #f9f9f9;
    }
    .upload-area.dragover {
      border-color: #4CAF50;
      background: #e8f5e9;
    }
    input[type="file"] {
      display: none;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .preview {
      margin: 20px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .preview-box {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 15px;
    }
    .preview-box h3 {
      margin-top: 0;
      color: #666;
      font-size: 14px;
      text-transform: uppercase;
    }
    .preview-box img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .info {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 4px;
      margin: 10px 0;
    }
    .success {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px;
      border-radius: 4px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 Magic WebP - Emscripten Test</h1>
    <p>Test animated WebP processing with native libwebp via Emscripten</p>

    <div class="upload-area" id="uploadArea">
      <p>📁 Drop an animated WebP file here or click to select</p>
      <input type="file" id="fileInput" accept="image/webp,.webp">
    </div>

    <div class="controls">
      <button id="cropBtn" disabled>Crop (100x100 from 0,0)</button>
      <button id="resizeBtn" disabled>Resize to 200x200</button>
      <button id="resizeFitBtn" disabled>Resize Fit 300x300</button>
    </div>

    <div id="message"></div>

    <div class="preview">
      <div class="preview-box">
        <h3>Original</h3>
        <img id="originalImg" style="display:none">
        <div class="info" id="originalInfo"></div>
      </div>
      <div class="preview-box">
        <h3>Processed</h3>
        <img id="processedImg" style="display:none">
        <div class="info" id="processedInfo"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { MagicWebp } from '../src-js/index-emscripten.ts';

    let currentImage = null;

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const cropBtn = document.getElementById('cropBtn');
    const resizeBtn = document.getElementById('resizeBtn');
    const resizeFitBtn = document.getElementById('resizeFitBtn');
    const message = document.getElementById('message');
    const originalImg = document.getElementById('originalImg');
    const processedImg = document.getElementById('processedImg');
    const originalInfo = document.getElementById('originalInfo');
    const processedInfo = document.getElementById('processedInfo');

    function showMessage(text, type = 'info') {
      message.innerHTML = `<div class="${type}">${text}</div>`;
    }

    function showError(text) {
      showMessage(text, 'error');
    }

    function showSuccess(text) {
      showMessage(text, 'success');
    }

    async function loadFile(file) {
      try {
        showMessage('Loading file...');
        currentImage = await MagicWebp.fromFile(file);

        // Show original
        const originalUrl = currentImage.toObjectUrl();
        originalImg.src = originalUrl;
        originalImg.style.display = 'block';
        originalInfo.textContent = `Size: ${(file.size / 1024).toFixed(2)} KB`;

        // Enable buttons
        cropBtn.disabled = false;
        resizeBtn.disabled = false;
        resizeFitBtn.disabled = false;

        showSuccess('File loaded successfully!');
      } catch (error) {
        showError(`Failed to load file: ${error.message}`);
        console.error(error);
      }
    }

    async function processImage(operation, name) {
      if (!currentImage) return;

      try {
        showMessage(`Processing: ${name}...`);
        const startTime = performance.now();

        const processed = operation(currentImage);
        const blob = processed.toBlob();
        const endTime = performance.now();

        // Show processed
        const processedUrl = URL.createObjectURL(blob);
        processedImg.src = processedUrl;
        processedImg.style.display = 'block';
        processedInfo.textContent = `Size: ${(blob.size / 1024).toFixed(2)} KB | Time: ${(endTime - startTime).toFixed(2)}ms`;

        showSuccess(`${name} completed!`);
      } catch (error) {
        showError(`Failed to process: ${error.message}`);
        console.error(error);
      }
    }

    // Event listeners
    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'image/webp') {
        loadFile(file);
      } else {
        showError('Please drop a WebP file');
      }
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        loadFile(file);
      }
    });

    cropBtn.addEventListener('click', () => {
      processImage(img => img.crop(0, 0, 100, 100), 'Crop');
    });

    resizeBtn.addEventListener('click', () => {
      processImage(img => img.resize(200, 200), 'Resize');
    });

    resizeFitBtn.addEventListener('click', () => {
      processImage(img => img.resizeFit(300, 300), 'Resize Fit');
    });
  </script>
</body>
</html>
